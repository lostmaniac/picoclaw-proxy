name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.2.0), leave empty for snapshot build"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
          - goos: windows
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY=picoclaw-proxy
          if [ "$GOOS" = "windows" ]; then
            BINARY=${BINARY}.exe
          fi
          go build -ldflags="-s -w" -o ${BINARY} .
          echo "BINARY=${BINARY}" >> $GITHUB_ENV

      - name: Package macOS
        if: matrix.goos == 'darwin'
        run: |
          # ad-hoc codesign
          codesign --force --deep -s - ${{ env.BINARY }}

          # 创建双击可启动的 .command 文件
          cat > "启动 CDP 代理.command" << 'LAUNCHER'
          #!/bin/bash
          cd "$(dirname "$0")"
          BINARY=$(ls picoclaw-proxy-darwin-* 2>/dev/null | head -1)
          if [ -z "$BINARY" ]; then
            echo "[!] 未找到 picoclaw-proxy 二进制文件"
            echo "    请确保本文件与 picoclaw-proxy-darwin-* 在同一目录"
            read -p "按回车键退出..."
            exit 1
          fi
          chmod +x "$BINARY"
          xattr -cr "$BINARY" 2>/dev/null
          exec "./$BINARY"
          LAUNCHER
          chmod +x "启动 CDP 代理.command"

          # 打 zip 包 (保留可执行权限)
          zip -r "picoclaw-proxy-darwin-${{ matrix.goarch }}.zip" \
            "${{ env.BINARY }}" "启动 CDP 代理.command"

      - name: Upload macOS artifact
        if: matrix.goos == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: picoclaw-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: picoclaw-proxy-darwin-${{ matrix.goarch }}.zip
          retention-days: 5

      - name: Upload other artifact
        if: matrix.goos != 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: picoclaw-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.BINARY }}
          retention-days: 5

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release assets
        run: |
          set -e
          mkdir -p release-assets
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            # macOS zip
            for zf in "$dir"/*.zip; do
              [ -f "$zf" ] && cp "$zf" release-assets/
            done
            # Windows exe
            if [ -f "$dir/picoclaw-proxy.exe" ]; then
              cp "$dir/picoclaw-proxy.exe" "release-assets/${name}.exe"
            fi
            # Linux raw binary
            if [ -f "$dir/picoclaw-proxy" ]; then
              cp "$dir/picoclaw-proxy" "release-assets/${name}"
            fi
          done
          echo "--- Release assets ---"
          ls -lh release-assets/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          TAG="${TAG#v}"
          echo "tag=v${TAG}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          body: |
            ## 安装

            ### macOS (双击启动)
            1. 下载 `picoclaw-proxy-darwin-arm64.zip` (Apple Silicon) 或 `picoclaw-proxy-darwin-amd64.zip` (Intel)
            2. 解压 zip
            3. 双击 **启动 CDP 代理.command** 即可运行
            4. 如提示"无法验证开发者"，右键点击 → 打开 → 打开

            ### macOS (命令行)
            ```bash
            chmod +x picoclaw-proxy-darwin-arm64
            xattr -cr picoclaw-proxy-darwin-arm64
            ./picoclaw-proxy-darwin-arm64
            ```

            ### Linux
            ```bash
            chmod +x picoclaw-proxy-linux-amd64
            ./picoclaw-proxy-linux-amd64
            ```

            ### Windows
            直接运行 `picoclaw-proxy-windows-amd64.exe`

            ## 用法

            ```bash
            # 默认配置 (允许 10.88.7.0/24)
            ./picoclaw-proxy

            # 自定义网段
            ./picoclaw-proxy -allow "10.88.7.0/24,192.168.1.0/24"

            # 自定义 CDP 地址和端口
            ./picoclaw-proxy -cdp 127.0.0.1:9333 -port 9333
            ```
          files: release-assets/*
