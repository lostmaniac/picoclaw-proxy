name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.2.0), leave empty for snapshot build"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY=picoclaw-proxy
          if [ "$GOOS" = "windows" ]; then
            BINARY=${BINARY}.exe
          fi
          go build -ldflags="-s -w" -o ${BINARY} .
          echo "BINARY=${BINARY}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: picoclaw-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.BINARY }}
          retention-days: 5

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release assets
        run: |
          set -e
          mkdir -p release-assets
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            if [ -f "$dir/picoclaw-proxy.exe" ]; then
              cp "$dir/picoclaw-proxy.exe" "release-assets/${name}.exe"
            elif [ -f "$dir/picoclaw-proxy" ]; then
              cp "$dir/picoclaw-proxy" "release-assets/${name}"
            fi
          done
          ls -lh release-assets/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          # ensure v-prefix
          TAG="${TAG#v}"
          echo "tag=v${TAG}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: release-assets/*
