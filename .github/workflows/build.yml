name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.2.0), leave empty for snapshot build"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
          - goos: windows
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY=picoclaw-proxy
          if [ "$GOOS" = "windows" ]; then
            BINARY=${BINARY}.exe
          fi
          go build -ldflags="-s -w" -o ${BINARY} .
          echo "BINARY=${BINARY}" >> $GITHUB_ENV

      - name: Codesign (macOS)
        if: matrix.goos == 'darwin'
        run: codesign --force --deep -s - ${{ env.BINARY }}

      - name: Package
        run: |
          # 统一命名: picoclaw-proxy-{os}-{arch}.zip
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            OS_NAME=macos
          else
            OS_NAME=${{ matrix.goos }}
          fi
          ZIP_NAME="picoclaw-proxy-${OS_NAME}-${{ matrix.goarch }}.zip"
          zip -j "$ZIP_NAME" "${{ env.BINARY }}"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: picoclaw-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 5

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release assets
        run: |
          set -e
          mkdir -p release-assets
          for dir in artifacts/*/; do
            for zf in "$dir"/*.zip; do
              [ -f "$zf" ] && cp "$zf" release-assets/
            done
          done
          echo "--- Release assets ---"
          ls -lh release-assets/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          TAG="${TAG#v}"
          echo "tag=v${TAG}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          body: |
            ## 安装

            所有平台均下载 zip 包，解压后使用。

            ### macOS
            ```bash
            unzip picoclaw-proxy-macos-arm64.zip
            chmod +x picoclaw-proxy
            xattr -cr picoclaw-proxy
            ./picoclaw-proxy
            ```

            ### Linux
            ```bash
            unzip picoclaw-proxy-linux-amd64.zip
            chmod +x picoclaw-proxy
            ./picoclaw-proxy
            ```

            ### Windows
            解压 `picoclaw-proxy-windows-amd64.zip`，运行 `picoclaw-proxy.exe`

            ## 用法

            ```bash
            # 默认配置 (允许 10.88.7.0/24)
            ./picoclaw-proxy

            # 自定义网段
            ./picoclaw-proxy -allow "10.88.7.0/24,192.168.1.0/24"

            # 自定义 CDP 地址和端口
            ./picoclaw-proxy -cdp 127.0.0.1:9333 -port 9333
            ```
          files: release-assets/*
